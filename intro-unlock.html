<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zeberl — Entsperr-Intro</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Hanken+Grotesk:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500&display=swap');
:root{--bg:#0a0d12;--ink:#eef2f6;--muted:#9fb3c8;--dim:#6f88a3;--gold:#C69A52;--gold-l:#E0C184;--green:#43d17a;--line:rgba(255,255,255,.12)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--ink);font-family:'Hanken Grotesk',sans-serif;height:100vh;overflow:hidden}
/* Site hinter dem Schloss */
#site{position:fixed;inset:0;display:grid;place-items:center;text-align:center;background:radial-gradient(120% 90% at 50% 30%,#141a22,#0a0d12 70%);opacity:0;transform:scale(1.04)}
#site .eyebrow{font-family:'Spline Sans Mono',monospace;font-size:.66rem;letter-spacing:.34em;text-transform:uppercase;color:var(--gold);margin-bottom:16px}
#site h1{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:clamp(2.6rem,8vw,5rem);letter-spacing:-.02em;text-transform:uppercase}
#site h1 em{font-style:normal;color:var(--gold-l)}
#site p{color:var(--muted);margin-top:14px}
/* Lock-Overlay */
#lock{position:fixed;inset:0;z-index:10;display:grid;place-items:center;background:radial-gradient(120% 100% at 50% 35%,#141a22,#070a0e 75%);transition:opacity .7s ease,visibility .7s}
#lock.open{opacity:0;visibility:hidden;pointer-events:none}
.term{position:relative;width:min(90vw,340px);padding:34px 30px 30px;border:1px solid var(--line);border-radius:22px;background:rgba(255,255,255,.04);backdrop-filter:blur(14px);text-align:center;box-shadow:0 40px 90px -30px rgba(0,0,0,.7)}
.term .eyb{font-family:'Spline Sans Mono',monospace;font-size:.6rem;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);margin-bottom:18px}
.padlock{width:74px;height:auto;margin:0 auto 14px;display:block}
.padlock .shk{transform-box:fill-box;transform-origin:bottom center}
.dots{display:flex;gap:12px;justify-content:center;margin:6px 0 16px}
.dot{width:13px;height:13px;border-radius:50%;border:1.5px solid var(--dim);transition:.25s}
.dot.on{background:var(--gold-l);border-color:var(--gold-l);box-shadow:0 0 10px rgba(224,193,132,.5)}
.status{font-family:'Spline Sans Mono',monospace;font-size:.74rem;letter-spacing:.06em;color:var(--muted);min-height:1.2em;margin-bottom:20px;transition:color .3s}
.status.ok{color:var(--green)}
.pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.key{padding:14px 0;border:1px solid var(--line);border-radius:12px;background:rgba(255,255,255,.03);color:var(--ink);font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:1.25rem;cursor:pointer;transition:.18s;user-select:none}
.key:hover{background:rgba(224,193,132,.12);border-color:rgba(224,193,132,.4)}
.key:active{transform:scale(.95)}
.key.ghost{visibility:hidden}
.hint{margin-top:16px;font-family:'Spline Sans Mono',monospace;font-size:.6rem;letter-spacing:.1em;color:var(--dim)}
.replay{position:fixed;bottom:20px;right:22px;z-index:20;font-family:'Spline Sans Mono',monospace;font-size:.7rem;color:var(--dim);background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:40px;padding:7px 16px;cursor:pointer}
.replay:hover{color:var(--ink)}
.scan{position:absolute;inset:0;border-radius:22px;pointer-events:none;box-shadow:0 0 0 0 rgba(67,209,122,0)}
.term.granted .scan{animation:grant .7s ease}
@keyframes grant{0%{box-shadow:0 0 0 0 rgba(67,209,122,.5)}100%{box-shadow:0 0 0 22px rgba(67,209,122,0)}}
@media(prefers-reduced-motion:reduce){#lock{transition:none}}
</style>
</head>
<body>

<div id="site">
  <div>
    <div class="eyebrow">Meisterbetrieb · Neumarkt</div>
    <h1>Sicherheit,<br>die <em>hält</em>.</h1>
    <p>Schließanlagen · Zutrittskontrolle · Automatikschlösser</p>
  </div>
</div>

<div id="lock">
  <div class="term" id="term">
    <div class="scan"></div>
    <div class="eyb">Zutrittskontrolle · Zeberl</div>
    <svg class="padlock" id="padlock" viewBox="0 0 100 120">
      <path class="shk" id="shk" d="M28,52 V38 a22,22 0 0 1 44,0 V52" fill="none" stroke="#E0C184" stroke-width="8" stroke-linecap="round"/>
      <rect x="20" y="50" width="60" height="50" rx="10" fill="none" stroke="#cfe0f0" stroke-width="6"/>
      <circle cx="50" cy="70" r="6" fill="#E0C184"/>
      <rect x="47" y="74" width="6" height="14" rx="3" fill="#E0C184"/>
    </svg>
    <div class="dots" id="dots"><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
    <div class="status" id="status">Code eingeben zum Entsperren</div>
    <div class="pad" id="pad">
      <div class="key">1</div><div class="key">2</div><div class="key">3</div>
      <div class="key">4</div><div class="key">5</div><div class="key">6</div>
      <div class="key">7</div><div class="key">8</div><div class="key">9</div>
      <div class="key ghost">·</div><div class="key">0</div><div class="key ghost">·</div>
    </div>
    <div class="hint">Tippen oder Tastatur · entriegelt automatisch</div>
  </div>
</div>
<button class="replay" onclick="location.reload()">↻ Replay</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
const reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
let code=[], unlocked=false, auto;
const dots=[...document.querySelectorAll('.dot')];
const status=document.getElementById('status');
function press(d){
  if(unlocked||code.length>=4) return;
  clearTimeout(auto);
  code.push(d); dots[code.length-1].classList.add('on');
  if(code.length===4) setTimeout(unlock,260);
}
function unlock(){
  if(unlocked) return; unlocked=true;
  const term=document.getElementById('term');
  status.textContent='✓ ZUTRITT GEWÄHRT'; status.classList.add('ok');
  term.classList.add('granted');
  if(reduce){ document.getElementById('lock').classList.add('open'); revealSite(); return; }
  const tl=gsap.timeline();
  tl.to('#shk',{y:-16,rotate:32,duration:.5,ease:'back.out(2)'},0)
    .to('#padlock',{scale:1.06,duration:.3,yoyo:true,repeat:1},0)
    .to('#lock',{opacity:0,duration:.7,ease:'power2.inOut',onStart:revealSite,onComplete:()=>document.getElementById('lock').classList.add('open')},.5);
}
function revealSite(){
  if(reduce){ gsap.set('#site',{opacity:1,scale:1}); return; }
  gsap.to('#site',{opacity:1,scale:1,duration:1.1,ease:'power3.out'});
}
document.getElementById('pad').addEventListener('click',e=>{
  const k=e.target.closest('.key'); if(!k||k.classList.contains('ghost'))return; press(k.textContent.trim());
});
addEventListener('keydown',e=>{ if(/^[0-9]$/.test(e.key)) press(e.key); });
/* Auto-Demo: nach 2,6s tippt es selbst */
auto=setTimeout(()=>{
  let i=0; const seq=['7','3','9','1'];
  (function tick(){ if(i<seq.length&&!unlocked){ press(seq[i++]); setTimeout(tick,360);} })();
},2600);
</script>
</body>
</html>
